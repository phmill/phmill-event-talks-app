<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechTalks 2026 | One Day of Innovation</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <h1>TechTalks <span class="accent">2026</span></h1>
            <p class="subtitle">A full day of deep technical dives • March 26, 2026</p>
        </div>
    </header>

    <main class="container">
        <section class="controls">
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="Search by title, speaker or category...">
            </div>
            <div id="categoryTags" class="tags-container">
                <!-- Tags will be dynamically added here -->
            </div>
        </section>

        <section id="schedule" class="schedule">
            <!-- Talks will be dynamically added here -->
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 TechTalks Conference. Built with Node.js.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
